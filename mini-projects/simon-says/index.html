<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simon Says</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Simon Says</h1>
    <h3>Press any Key to start the game</h3>
    <div class="button-container">
        <div class="button-row">
            <div class="button red" id="red" type="button" ></div>
            <div class="button green" id="green" type="button"></div>
        </div>
        <div class="button-row">
            <div class="button yellow" id="yellow" type="button"></div>
            <div class="button blue" id="blue" type="button"></div>
        </div>
    </div>

    <br>
    <button id="hint"><b>Hint!</b></button>


    <script src="app.js"></script>
</body>
</html>
